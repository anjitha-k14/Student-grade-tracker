<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Grade Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .auth-container h1 {
            font-size: 2rem;
            color: #1a365d;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .auth-container p {
            color: #4a5568;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        form input {
            padding: 0.9rem 1.2rem;
            border: 2px solid #edf2f7;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        form input:focus {
            outline: none;
            border-color: #e73c7e;
            background: white;
            box-shadow: 0 0 0 3px rgba(231, 60, 126, 0.15);
        }

        form button {
            background: linear-gradient(135deg, #e73c7e, #ee7752);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            box-shadow: 0 4px 15px rgba(231, 60, 126, 0.3);
        }

        form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 60, 126, 0.4);
            background: linear-gradient(135deg, #d32d6d, #d15d3a);
        }

        .flash {
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .flash.error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #f5c6c6;
        }

        .flash.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #b2e8c2;
        }

        .toggle-link {
            display: block;
            margin-top: 1.5rem;
            color: #e73c7e;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .toggle-link:hover {
            text-decoration: underline;
            color: #d32d6d;
        }
        .app-header {
            position: absolute;
            top: 2.5rem;
            left: 2.5rem;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .app-header {
                position: static;
                text-align: center;
                margin-bottom: 2rem;
            }
            body {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-header">Student Grade Tracker</div>
    <div class="auth-container">
        <h1>Create Account</h1>
        <p>Start tracking student grades today</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose a Username" required>
            <div style="position: relative; width: 100%;">
                <input type="password" name="password" id="password" placeholder="Create a Password" style="width: 100%;" required>
                <span onclick="togglePassword()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 0.9em; color: #4a5568; font-weight: 600; user-select: none;">Show</span>
            </div>
            <button type="submit">Sign Up</button>
        </form>

        <a href="/login" class="toggle-link">Already have an account? Log in here</a>
    </div>
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const span = document.querySelector('span[onclick="togglePassword()"]');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                span.textContent = 'Hide';
            } else {
                pwd.type = 'password';
                span.textContent = 'Show';
            }
        }
    </script>
</body>
</html>
